[phases.setup]
nixPkgs = ["nodejs-18_x", "python311", "ffmpeg", "yt-dlp"]
aptPkgs = ["ffmpeg", "python3", "python3-pip"]

[phases.install]
cmds = ["npm install" "pip install faster-whisper"]

[phases.build]
cmds = ["echo 'Building with Nixpacks'"]

[start]
cmd = "node server/index.js"

# Environment variables
[variables]
NODE_ENV = "production"
PORT = "3000"
